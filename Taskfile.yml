version: '3'

vars:
  BIN_DIR: bin

# DATABASE_URL must be set in the environment or passed inline:
#   DATABASE_URL=postgres://... task migrate-up

tasks:

  # ── Build ────────────────────────────────────────────────────────────────────
  build:
    desc: Compile CLI and server binaries into bin/
    cmds:
      - go build -o {{.BIN_DIR}}/wfp-cli    ./cmd/cli
      - go build -o {{.BIN_DIR}}/wfp-server ./cmd/server

  build-cli:
    desc: Compile only the CLI binary
    cmds:
      - go build -o {{.BIN_DIR}}/wfp-cli ./cmd/cli

  build-server:
    desc: Compile only the server binary
    cmds:
      - go build -o {{.BIN_DIR}}/wfp-server ./cmd/server

  # ── Run (without pre-building) ────────────────────────────────────────────
  run-server:
    desc: Start the HTTP server (requires DATABASE_URL)
    cmds:
      - go run ./cmd/server

  # Pass subcommand via CLI: task run-cli -- version list
  run-cli:
    desc: Run the CLI (append subcommand after --)
    cmds:
      - go run ./cmd/cli {{.CLI_ARGS}}

  # ── Database migrations ───────────────────────────────────────────────────
  migrate-up:
    desc: Apply all pending Goose migrations
    cmds:
      - goose -dir sql/migrations postgres "$DATABASE_URL" up

  migrate-down:
    desc: Roll back the last Goose migration
    cmds:
      - goose -dir sql/migrations postgres "$DATABASE_URL" down

  migrate-status:
    desc: Show applied / pending migration status
    cmds:
      - goose -dir sql/migrations postgres "$DATABASE_URL" status

  # ── Code generation ───────────────────────────────────────────────────────
  sqlc-gen:
    desc: Regenerate internal/db from sql/queries and sql/migrations
    cmds:
      - sqlc generate

  # ── Tests ─────────────────────────────────────────────────────────────────
  test:
    desc: Run all tests
    cmds:
      - go test ./...

  test-v:
    desc: Run all tests with verbose output
    cmds:
      - go test -v ./...

  # ── Quality ───────────────────────────────────────────────────────────────
  vet:
    desc: Run go vet
    cmds:
      - go vet ./...

  lint:
    desc: Run golangci-lint
    cmds:
      - golangci-lint run ./...

  tidy:
    desc: Tidy go.mod and go.sum
    cmds:
      - go mod tidy
